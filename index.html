<script>
'use strict';

/* ============================================================
   CONFIG
   ============================================================ */
function isMobile()  { return window.innerWidth <= 768; }
const IS_MOBILE     = isMobile();   // boot-time snapshot — used for physics grid only
const PREFERS_DARK  = window.matchMedia('(prefers-color-scheme: dark)').matches;
const COLS          = IS_MOBILE ? 20 : 30;
const ROWS          = IS_MOBILE ? 28 : 30;
const SPACING       = 18;      // px between adjacent points at rest
let   gravity       = 0.5;
let   damping       = 0.99;    // velocity retention per frame (per-preset)
let   iterations    = 8;       // constraint relaxation passes / frame
let   tearDist      = 60;      // auto-tear threshold (× rest length, per-preset)
let   windResponse  = 1.0;     // wind sensitivity multiplier (per-preset)
let   stickiness    = 0.22;   // dirt particle adhesion 0–1 (per-preset)
let   dryRate       = 0.012;  // wetness decay per frame (per-preset)
const MOUSE_RADIUS  = 36;
const WIND_STRENGTH = 1.2;
const WIND_SPEED    = 0.03;

/* ============================================================
   Point
   ============================================================ */
class Point {
  constructor(x, y, pinned = false) {
    this.x = x;  this.y = y;  this.z = 0;
    this.prevX = x;  this.prevY = y;  this.prevZ = 0;
    this.pinned = pinned;
    this.initX = x;  this.initY = y;  this.initZ = 0;
  }

  update(ax, ay, az) {
    if (this.pinned) return;
    const vx = (this.x - this.prevX) * damping;
    const vy = (this.y - this.prevY) * damping;
    const vz = (this.z - this.prevZ) * damping;
    this.prevX = this.x;  this.prevY = this.y;  this.prevZ = this.z;
    this.x += vx + ax;
    this.y += vy + ay;
    this.z += vz + az - (this.z - this.initZ) * 0.0002; // gentle restoring force toward rest tilt
  }

  reset() {
    this.x = this.initX;  this.y = this.initY;  this.z = this.initZ;
    this.prevX = this.initX;  this.prevY = this.initY;  this.prevZ = this.initZ;
  }
}

/* ============================================================
   Constraint
   ============================================================ */
class Constraint {
  constructor(p1, p2) {
    this.p1 = p1;
    this.p2 = p2;
    const dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
    this.restLength = Math.sqrt(dx * dx + dy * dy + dz * dz);
    this.active = true;
  }

  satisfy() {
    if (!this.active) return;
    const dx   = this.p2.x - this.p1.x;
    const dy   = this.p2.y - this.p1.y;
    const dz   = this.p2.z - this.p1.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 0.0001;
    const diff = (dist - this.restLength) / dist;

    if (dist > this.restLength * tearDist) { this.active = false; return; }

    const ox = dx * diff, oy = dy * diff, oz = dz * diff;

    if (!this.p1.pinned && !this.p2.pinned) {
      this.p1.x += ox * 0.5;  this.p1.y += oy * 0.5;  this.p1.z += oz * 0.5;
      this.p2.x -= ox * 0.5;  this.p2.y -= oy * 0.5;  this.p2.z -= oz * 0.5;
    } else if (!this.p1.pinned) {
      this.p1.x += ox;  this.p1.y += oy;  this.p1.z += oz;
    } else if (!this.p2.pinned) {
      this.p2.x -= ox;  this.p2.y -= oy;  this.p2.z -= oz;
    }
  }
}

/* ============================================================
   Cloth
   ============================================================ */
class Cloth {
  /* pinCfg: 'top-row' | 'left-col' | 'top-corners' | other — controls initial Z tilt axis */
  constructor(originX, originY, pinCfg = 'top-row') {
    this.originX = originX;
    this.originY = originY;
    this.points      = [];
    this.constraints = [];
    /* Constraint lookup maps: used by the quad renderer.
       hLinks[row][col] = horizontal constraint at (row,col)→(row,col+1)
       vLinks[row][col] = vertical   constraint at (row,col)→(row+1,col) */
    this.hLinks = [];
    this.vLinks = [];
    this._build(pinCfg);
  }

  _build(pinCfg) {
    this.points      = [];
    this.constraints = [];
    this.hLinks      = [];
    this.vLinks      = [];

    /* Points */
    /* INIT_Z_TILT: total depth range across one axis.
       For top-row: vertical gradient (top=−18 behind, bottom=+18 toward viewer)
         → the hanging cloth shows perspective foreshortening at rest.
       For left-col (Sail): horizontal gradient (mast col0=−18 behind, free edge=+18 toward viewer)
         → the sail naturally extends away from the mast into the scene.
       For other configs (top-corners etc.): no gradient, just symmetry-breaking jitter. */
    const INIT_Z_TILT = 36;
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const pt = new Point(
          this.originX + col * SPACING,
          this.originY + row * SPACING,
          row === 0
        );
        let zGrad;
        if (pinCfg === 'left-col') {
          zGrad = (col / (COLS - 1) - 0.5) * INIT_Z_TILT; // −18 at mast, +18 at free edge
        } else if (pinCfg === 'top-row') {
          zGrad = (row / (ROWS - 1) - 0.5) * INIT_Z_TILT; // −18 at top, +18 at bottom
        } else {
          zGrad = 0; // no gradient for other configs
        }
        const jit = (Math.random() - 0.5) * (pt.pinned ? 0 : 2);
        pt.z = zGrad + jit;  pt.prevZ = zGrad + jit;  pt.initZ = zGrad + jit;
        this.points.push(pt);
      }
    }

    /* Constraints + lookup tables */
    for (let row = 0; row < ROWS; row++) {
      this.hLinks.push([]);
      this.vLinks.push([]);
      for (let col = 0; col < COLS; col++) {
        const idx = row * COLS + col;

        if (col < COLS - 1) {
          const c = new Constraint(this.points[idx], this.points[idx + 1]);
          this.constraints.push(c);
          this.hLinks[row].push(c);
        } else {
          this.hLinks[row].push(null);
        }

        if (row < ROWS - 1) {
          const c = new Constraint(this.points[idx], this.points[idx + COLS]);
          this.constraints.push(c);
          this.vLinks[row].push(c);
        } else {
          this.vLinks[row].push(null);
        }
      }
    }
  }

  update(windX, windZ) {
    for (const pt of this.points) pt.update(windX, gravity, windZ);
    for (let i = 0; i < iterations; i++)
      for (const c of this.constraints) c.satisfy();
  }

  reset() {
    for (const pt of this.points)      pt.reset();
    for (const c  of this.constraints) c.active = true;
  }

  nearestPoint(mx, my) {
    let best = null, bestDist = MOUSE_RADIUS;
    for (const pt of this.points) {
      const dx = pt.x - mx, dy = pt.y - my;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < bestDist) { bestDist = d; best = pt; }
    }
    return best;
  }

  tearNear(mx, my) {
    const r2 = MOUSE_RADIUS * MOUSE_RADIUS;
    for (const c of this.constraints) {
      if (!c.active) continue;
      const midX = (c.p1.x + c.p2.x) * 0.5;
      const midY = (c.p1.y + c.p2.y) * 0.5;
      const dx   = midX - mx, dy = midY - my;
      if (dx * dx + dy * dy < r2) c.active = false;
    }
  }
}

/* ============================================================
   Main
   ============================================================ */
(function main() {
  /* ── Canvas setup ── */
  const canvas  = document.getElementById('canvas');
  const gl      = canvas.getContext('webgl', { preserveDrawingBuffer: true });
  const overlay = document.getElementById('overlay');
  const ctx2d   = overlay.getContext('2d');

  if (!gl) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;font-family:'Pretendard',sans-serif;background:#f5f5f5"><div style="font-size:28px;font-weight:200;letter-spacing:8px;color:#111;text-transform:uppercase">Fabric</div><div style="font-size:12px;letter-spacing:3px;color:#767676;text-transform:lowercase">WebGL not supported in this browser</div><div style="font-size:11px;letter-spacing:1px;color:#aaa">Try Chrome, Firefox, or Safari 15+</div></div>`;
    return;
  }

  const elWind      = document.getElementById('modeWind');
  const elTear      = document.getElementById('modeTear');
  const elMic       = document.getElementById('modeMic');
  const elMicMeter  = document.getElementById('micMeter');
  const elGrain     = document.getElementById('modeGrain');
  const elDirt      = document.getElementById('modeDirt');
  const elWater     = document.getElementById('modeWater');
  const hud         = document.getElementById('hud');
  const texFile     = document.getElementById('texFile');
  const texUploadBtn= document.getElementById('texUploadBtn');
  const texClear    = document.getElementById('texClear');

  /* ── Mobile nav button refs ── */
  const mobHeader  = document.getElementById('mob-header');
  const mobNav     = document.getElementById('mob-nav');
  const mobTear    = document.getElementById('mobTear');
  const mobDirt    = document.getElementById('mobDirt');
  const mobWater   = document.getElementById('mobWater');
  const mobWind    = document.getElementById('mobWind');
  const mobMore    = document.getElementById('mobMore');

  /* ── More bottom sheet refs ── */
  const fxBackdrop = document.getElementById('fx-backdrop');
  const fxSheet    = document.getElementById('fx-sheet');
  const fxGrain    = document.getElementById('fxGrain');
  const fxCollider    = document.getElementById('fxCollider');
  const fxSilk        = document.getElementById('fxSilk');
  const fxDenim       = document.getElementById('fxDenim');
  const fxLinen       = document.getElementById('fxLinen');
  const fxDefault     = document.getElementById('fxDefault');
  const fxCurtain     = document.getElementById('fxCurtain');
  const fxSail        = document.getElementById('fxSail');
  const fxJeans       = document.getElementById('fxJeans');
  const fxScenReset   = document.getElementById('fxScenarioReset');
  const fxReset       = document.getElementById('fxReset');
  const fxSaveBtn     = document.getElementById('fxSave');
  const fxUploadBtn2  = document.getElementById('fxUpload');
  const fxMicBtn      = document.getElementById('fxMic');

  /* ── Language localisation — Korean if system lang starts with 'ko' ── */
  if (navigator.language && navigator.language.toLowerCase().startsWith('ko')) {
    isKorean = true;
    /* Mark document language for screen readers */
    document.documentElement.lang = 'ko';

    /* Switch entire page to Noto Sans KR */

      mobWind .querySelector('.mob-label').textContent = '바람';
      mobMore .querySelector('.mob-label').textContent = '더 보기';

    }
  }

  /* ── WebGL — shaders ── */
  const VS_SRC = `
    attribute vec3  aPosition;
    attribute vec2  aUV;
    attribute float aShade;
    attribute vec3  aNormal;
    attribute float aDirt;
    attribute float aWetness;
    uniform mat4    uMVP;
    varying vec2    vUV;
    varying float   vShade;
    varying vec3    vNormal;
    varying float   vDirt;
    varying float   vWetness;
    void main() {
      gl_Position = uMVP * vec4(aPosition, 1.0);
      vUV      = aUV;
      vShade   = aShade;
      vNormal  = aNormal;
      vDirt    = aDirt;
      vWetness = aWetness;
    }
  `;

  const FS_SRC = `
    precision mediump float;
    varying vec2  vUV;
    varying float vShade;
    varying vec3  vNormal;
    varying float vDirt;
    varying float vWetness;
    uniform int   uHasTexture;
    uniform int   uIsLine;
    uniform sampler2D uTexture;
    uniform vec3  uClothColor;
    uniform float uLineAlpha;

    /* Simple hash for pseudo-random noise */
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
    }

    void main() {
      vec3 lightDir = vec3(0.196, -0.784, 0.588);
      vec3 halfVec  = vec3(0.110, -0.440, 0.891);
      vec3 N = normalize(gl_FrontFacing ? vNormal : -vNormal);
      float diffuse  = max(0.0, dot(N, lightDir));
      float specPow  = gl_FrontFacing ? 48.0 : 12.0;
      float specAmt  = gl_FrontFacing ? 0.35 : 0.10;
      
      float glisten = 0.0;
      float wetMask = 0.0;

      /* Apply wetness logic to lighting parameters */
      if (vWetness > 0.01) {
        float h1 = hash(vUV * 900.0);
        float h2 = hash(vUV * 400.0);
        wetMask = smoothstep(0.1, 0.5, vWetness * (0.75 + h2 * 0.5));
        glisten = pow(h1, 15.0) * vWetness * 1.8;
        specAmt += vWetness * 0.48 * (0.8 + h2 * 0.4);
        specPow -= vWetness * 18.0;
      }

      float specular = pow(max(0.0, dot(N, halfVec)), max(1.0, specPow)) * specAmt + glisten;
      float light    = 0.35 + diffuse * 0.6 + specular;
      float finalShade = light * clamp(vShade, 0.5, 1.1);
      float backFactor = gl_FrontFacing ? 1.0 : 0.85;

      vec3 baseColor = uClothColor;
      if (uHasTexture == 1) {
        baseColor = texture2D(uTexture, vUV).rgb;
      }

      /* Apply wetness darkening to baseColor */
      if (vWetness > 0.01) {
        baseColor *= (1.0 - wetMask * 0.45);
      }

      /* Apply rich dirt logic */
      if (vDirt > 0.01) {
        // High frequency noise for "grain" and irregular edges
        float grain = hash(vUV * 1200.0);
        // Multi-frequency noise for the "spot" shapes
        float shape = hash(vUV * 600.0) * 0.7 + hash(vUV * 250.0) * 0.3;
        
        // Threshold the noise based on vDirt. Higher vDirt = larger/more spots.
        // This breaks the vertex-circular look by using UV-space noise as a threshold.
        float threshold = clamp(1.0 - vDirt * 1.4, 0.0, 1.0);
        float splat = smoothstep(threshold - 0.08, threshold + 0.08, shape + grain * 0.15);
        
        // Darken the center of the splat for a "stain" look
        float core = smoothstep(threshold + 0.1, threshold + 0.3, shape + vDirt * 0.5);
        
        // Deep earth tones with variation
        vec3 col1 = vec3(0.24, 0.16, 0.08); // dark mud
        vec3 col2 = vec3(0.35, 0.28, 0.18); // dried dirt
        vec3 dirtColor = mix(col1, col2, grain) * (1.0 - core * 0.2) * 1.3;
        
        baseColor = mix(baseColor, dirtColor * light, splat * 0.9);
      }

      if (uIsLine == 1) {
        float stress    = clamp((1.0 - vShade) * 2.5, 0.0, 1.0);
        vec3  lineColor = mix(vec3(0.58, 0.58, 0.60), vec3(0.72, 0.30, 0.22), stress);
        gl_FragColor = vec4(lineColor * clamp(light, 0.5, 1.0), uLineAlpha);
      } else {
        gl_FragColor = vec4(baseColor * clamp(finalShade, 0.0, 1.5) * backFactor, 1.0);
      }
    }
  `;

  /* ── Background gradient shaders ── */
  const BG_VS_SRC = `
    attribute vec2 aBGPos;
    varying vec2   vBGUV;
    void main() {
      gl_Position = vec4(aBGPos, 0.0, 1.0);
      vBGUV = aBGPos * 0.5 + 0.5; /* clip (-1..1) → UV (0..1) */
    }
  `;
  const BG_FS_SRC = `
    precision mediump float;
    varying vec2  vBGUV;
    uniform vec3  uBGTop;
    uniform vec3  uBGBot;
    uniform float uBGTime;
    uniform float uBGWind;
    void main() {
      /* Midpoint breathes ±5% on an 8-second sine cycle */
      float mid = 0.5 + sin(uBGTime * 0.7854) * 0.05;
      /* Wind slightly brightens the top colour */
      vec3 top = clamp(uBGTop * (1.0 + uBGWind * 0.07), 0.0, 1.0);
      /* Two-stop gradient through animated midpoint */
      float t = vBGUV.y;
      float blend = t < mid ? (t / mid) * 0.45 : 0.45 + ((t - mid) / (1.0 - mid)) * 0.55;
      vec3 color = mix(top, uBGBot, blend);
      /* Radial edge vignette — ~12% darkening at corners */
      vec2 uv = vBGUV * 2.0 - 1.0;
      float vig = smoothstep(1.0, 0.25, length(uv * vec2(1.4, 1.0)));
      color *= (0.88 + 0.12 * vig);
      gl_FragColor = vec4(color, 1.0);
    }
  `;

  function compileShader(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      console.error('Shader compile error:', gl.getShaderInfoLog(sh));
      gl.deleteShader(sh);
      return null;
    }
    return sh;
  }

  const vs   = compileShader(gl.VERTEX_SHADER,   VS_SRC);
  const fs   = compileShader(gl.FRAGMENT_SHADER, FS_SRC);
  if (!vs || !fs) return;    // shader compile failed — already logged
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Program link error:', gl.getProgramInfoLog(prog));
    return;
  }
  gl.useProgram(prog);

  /* ── Attribute / uniform locations ── */
  const aPositionLoc   = gl.getAttribLocation(prog,  'aPosition');
  const aUVLoc         = gl.getAttribLocation(prog,  'aUV');
  const aShadeLoc      = gl.getAttribLocation(prog,  'aShade');
  const aNormalLoc     = gl.getAttribLocation(prog,  'aNormal');
  const aDirtLoc       = gl.getAttribLocation(prog,  'aDirt');
  const aWetnessLoc    = gl.getAttribLocation(prog,  'aWetness');
  const uMVPLoc         = gl.getUniformLocation(prog, 'uMVP');
  const uHasTextureLoc  = gl.getUniformLocation(prog, 'uHasTexture');
  const uIsLineLoc      = gl.getUniformLocation(prog, 'uIsLine');
  const uTextureLoc     = gl.getUniformLocation(prog, 'uTexture');
  const uClothColorLoc  = gl.getUniformLocation(prog, 'uClothColor');
  const uLineAlphaLoc   = gl.getUniformLocation(prog, 'uLineAlpha');

  console.info('WebGL Initialized:', { aPositionLoc, aDirtLoc, aWetnessLoc, uMVPLoc });

  /* ── Background gradient program ── */
  const bgVS = compileShader(gl.VERTEX_SHADER,   BG_VS_SRC);
  const bgFS = compileShader(gl.FRAGMENT_SHADER, BG_FS_SRC);
  const bgProg = gl.createProgram();
  gl.attachShader(bgProg, bgVS); gl.attachShader(bgProg, bgFS);
  gl.linkProgram(bgProg);
  if (!gl.getProgramParameter(bgProg, gl.LINK_STATUS)) {
    console.error('BG program link error:', gl.getProgramInfoLog(bgProg));
  }
  /* Fullscreen triangle (3 vertices cover all of clip space) */
  const bgVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, bgVBO);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const aBGPosLoc   = gl.getAttribLocation(bgProg,  'aBGPos');
  const uBGTopLoc   = gl.getUniformLocation(bgProg, 'uBGTop');
  const uBGBotLoc   = gl.getUniformLocation(bgProg, 'uBGBot');
  const uBGTimeLoc  = gl.getUniformLocation(bgProg, 'uBGTime');
  const uBGWindLoc  = gl.getUniformLocation(bgProg, 'uBGWind');

  /* Per-scenario palette: [lightTop, lightBot, darkTop, darkBot] (normalized RGB) */
  const BG_PALETTES = {
    DEFAULT:  [[.937,.937,.937], [.878,.878,.878], [.133,.133,.133], [.086,.086,.086]],
    CURTAIN:  [[.937,.937,.937], [.878,.878,.878], [.133,.133,.133], [.086,.086,.086]],
    JEANS:    [[.851,.871,.898], [.800,.827,.863], [.110,.133,.157], [.078,.102,.125]],
    SAIL:     [[.839,.918,.961], [.769,.859,.918], [.102,.165,.224], [.071,.122,.173]],
    SILK:     [[.941,.929,.910], [.902,.886,.855], [.157,.133,.118], [.118,.102,.086]],
    HAMMOCK:  [[.898,.922,.898], [.847,.878,.847], [.118,.137,.118], [.082,.102,.082]],
    TABLECLOTH:[[.961,.945,.945],[.922,.902,.902], [.149,.118,.118], [.110,.086,.086]],
  };
  let bgTopCurrent = BG_PALETTES.DEFAULT[0].slice();
  let bgBotCurrent = BG_PALETTES.DEFAULT[1].slice();

  function setBgPalette(scenarioKey) {
    const key   = scenarioKey.toUpperCase().replace(/-/g,'').replace(/ /g,'');
    const entry = BG_PALETTES[key] || BG_PALETTES.DEFAULT;
    bgTopCurrent = PREFERS_DARK ? entry[2].slice() : entry[0].slice();
    bgBotCurrent = PREFERS_DARK ? entry[3].slice() : entry[1].slice();
  }

  /* ── Preset state ── */
  const PRESETS = {
    // Silk: ultra-light, slippery, very wind-sensitive, snaps under slight overstretch
    SILK: {
      iterations: 4,  gravity: 0.25,
      tearDist: 3,    damping: 0.998,  windResponse: 2.8,  stickiness: 0.08,  dryRate: 0.025,
      color:     [0.85, 0.82, 0.80], lineAlpha:     0.25,
      colorDark: [0.45, 0.42, 0.40], lineAlphaDark: 0.18,
    },
    // Denim: heavy, rigid, wind-resistant, nearly impossible to auto-tear by stretch
    DENIM: {
      iterations: 18, gravity: 0.65,
      tearDist: 100,  damping: 0.983,  windResponse: 0.25,  stickiness: 0.90,  dryRate: 0.005,
      color:     [0.25, 0.35, 0.52], lineAlpha:     0.60,
      colorDark: [0.14, 0.20, 0.38], lineAlphaDark: 0.52,
    },
    // Linen: natural fibre — medium weight, moderate tear resistance, normal wind
    LINEN: {
      iterations: 10, gravity: 0.5,
      tearDist: 15,   damping: 0.992,  windResponse: 1.0,   stickiness: 0.45,  dryRate: 0.008,
      color:     [0.80, 0.78, 0.72], lineAlpha:     0.45,
      colorDark: [0.28, 0.26, 0.22], lineAlphaDark: 0.36,
    },
  };


  const DEFAULT_COLOR         = PREFERS_DARK ? [0.18, 0.18, 0.20] : [0.76, 0.76, 0.78];
  const DEFAULT_LINE_ALPHA    = PREFERS_DARK ? 0.40 : 0.50;
  const DEFAULT_GRAVITY       = gravity;
  const DEFAULT_ITERATIONS    = iterations;
  const DEFAULT_DAMPING       = damping;
  const DEFAULT_TEAR_DIST     = tearDist;
  const DEFAULT_WIND_RESPONSE = windResponse;
  const DEFAULT_STICKINESS    = stickiness;
  const DEFAULT_DRY_RATE      = dryRate;
  let clothColor   = DEFAULT_COLOR.slice();
  let lineAlpha    = DEFAULT_LINE_ALPHA;
  let activePreset = null;

  /* Set initial uniform values immediately after program is linked */
  gl.uniform3f(uClothColorLoc, ...clothColor);
  gl.uniform1f(uLineAlphaLoc,   lineAlpha);

  /* ── Buffers ── */
  const posBuffer     = gl.createBuffer();
  const uvBuffer      = gl.createBuffer();
  const shadeBuffer   = gl.createBuffer();
  const normalBuffer  = gl.createBuffer();
  const dirtBuffer    = gl.createBuffer();
  const wetnessBuffer = gl.createBuffer();
  const idxBuffer     = gl.createBuffer();
  const lineIdxBuffer = gl.createBuffer();

  /* Build and upload the UV buffer (normalized 0→1, static per cloth instance).
     UNPACK_FLIP_Y_WEBGL is set on texture upload so that UV (0,0) = top-left. */
  function buildUVBuffer() {
    const uvs = new Float32Array(ROWS * COLS * 2);
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const i = (row * COLS + col) * 2;
        uvs[i]     = col / (COLS - 1);   // u: 0→1 left→right
        uvs[i + 1] = row / (ROWS - 1);   // v: 0→1 top→bottom
      }
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, uvBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, uvs, gl.STATIC_DRAW);
  }

  /* Upload current cloth point positions (x,y,z — called every frame). */
  function uploadPositions(cloth) {
    const pos = new Float32Array(cloth.points.length * 3);
    for (let i = 0; i < cloth.points.length; i++) {
      pos[i * 3]     = cloth.points[i].x;
      pos[i * 3 + 1] = cloth.points[i].y;
      pos[i * 3 + 2] = cloth.points[i].z;
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, pos, gl.DYNAMIC_DRAW);
  }

  /* Compute per-vertex deformation shade from constraint stress (called every frame).
     shade = avg(currentLength / restLength) for each connected active constraint.
     < 1 → compressed (bunched/folded) → darker  |  ≈ 1 → rest → neutral  |  > 1 → stretched → slight highlight */
  function buildAndUploadShade(cloth) {
    const shades = new Float32Array(cloth.points.length);
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        let total = 0, count = 0;
        const accum = (c) => {
          if (!c || !c.active) return;
          const dx = c.p2.x - c.p1.x, dy = c.p2.y - c.p1.y, dz = c.p2.z - c.p1.z;
          const ratio = Math.sqrt(dx * dx + dy * dy + dz * dz) / c.restLength;
          /* Compressed folds → darker (min 0.55); taut fabric → slight highlight (max 1.08) */
          total += Math.min(1.08, Math.max(0.55, ratio));
          count++;
        };
        if (col > 0)       accum(cloth.hLinks[row][col - 1]);
        if (col < COLS - 1) accum(cloth.hLinks[row][col]);
        if (row > 0)       accum(cloth.vLinks[row - 1][col]);
        if (row < ROWS - 1) accum(cloth.vLinks[row][col]);
        shades[row * COLS + col] = count > 0 ? total / count : 1.0;
      }
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, shadeBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, shades, gl.DYNAMIC_DRAW);
  }

  /* Compute per-vertex world-space normals via face cross-products, then upload. */
  function buildAndUploadNormals(cloth) {
    const n  = cloth.points.length;
    const ns = new Float32Array(n * 3);  // accumulated normals (xyz per vertex)
    const ct = new Uint16Array(n);       // face contribution count per vertex

    for (let row = 0; row < ROWS - 1; row++) {
      for (let col = 0; col < COLS - 1; col++) {
        const top    = cloth.hLinks[row][col];
        const bottom = cloth.hLinks[row + 1][col];
        const left   = cloth.vLinks[row][col];
        const right  = cloth.vLinks[row][col + 1];
        if (!top || !bottom || !left || !right) continue;
        if (!top.active || !bottom.active || !left.active || !right.active) continue;

        const iTL = row * COLS + col;
        const iTR = row * COLS + col + 1;
        const iBL = (row + 1) * COLS + col;
        const iBR = (row + 1) * COLS + col + 1;
        const pTL = cloth.points[iTL], pTR = cloth.points[iTR];
        const pBL = cloth.points[iBL], pBR = cloth.points[iBR];

        /* Triangle 1: TL → TR → BL */
        let e1x = pTR.x - pTL.x, e1y = pTR.y - pTL.y, e1z = pTR.z - pTL.z;
        let e2x = pBL.x - pTL.x, e2y = pBL.y - pTL.y, e2z = pBL.z - pTL.z;
        let nx1 = e1y * e2z - e1z * e2y;
        let ny1 = e1z * e2x - e1x * e2z;
        let nz1 = e1x * e2y - e1y * e2x;
        for (const vi of [iTL, iTR, iBL]) {
          ns[vi * 3] += nx1;  ns[vi * 3 + 1] += ny1;  ns[vi * 3 + 2] += nz1;  ct[vi]++;
        }

        /* Triangle 2: TR → BR → BL */
        let e3x = pBR.x - pTR.x, e3y = pBR.y - pTR.y, e3z = pBR.z - pTR.z;
        let e4x = pBL.x - pTR.x, e4y = pBL.y - pTR.y, e4z = pBL.z - pTR.z;
        let nx2 = e3y * e4z - e3z * e4y;
        let ny2 = e3z * e4x - e3x * e4z;
        let nz2 = e3x * e4y - e3y * e4x;
        for (const vi of [iTR, iBR, iBL]) {
          ns[vi * 3] += nx2;  ns[vi * 3 + 1] += ny2;  ns[vi * 3 + 2] += nz2;  ct[vi]++;
        }
      }
    }

    /* Normalize accumulated normals; default to (0,0,1) for isolated/pinned verts */
    for (let i = 0; i < n; i++) {
      if (ct[i] === 0) { ns[i * 3 + 2] = 1; continue; }
      const nx = ns[i * 3], ny = ns[i * 3 + 1], nz = ns[i * 3 + 2];
      const len = Math.sqrt(nx * nx + ny * ny + nz * nz) || 1;
      ns[i * 3] = nx / len;  ns[i * 3 + 1] = ny / len;  ns[i * 3 + 2] = nz / len;
    }

    gl.bindBuffer(gl.ARRAY_BUFFER, normalBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, ns, gl.DYNAMIC_DRAW);
  }

  /* Build index list for active quads only (skips torn constraints).
     Returns the number of indices uploaded. */
  function buildAndUploadIndices(cloth) {
    const idx = [];
    for (let row = 0; row < ROWS - 1; row++) {
      for (let col = 0; col < COLS - 1; col++) {
        const top    = cloth.hLinks[row][col];
        const bottom = cloth.hLinks[row + 1][col];
        const left   = cloth.vLinks[row][col];
        const right  = cloth.vLinks[row][col + 1];
        if (!top || !bottom || !left || !right) continue;
        if (!top.active || !bottom.active || !left.active || !right.active) continue;
        const tl = row * COLS + col;
        const tr = row * COLS + col + 1;
        const br = (row + 1) * COLS + col + 1;
        const bl = (row + 1) * COLS + col;
        idx.push(tl, tr, bl);   // triangle 1
        idx.push(tr, br, bl);   // triangle 2
      }
    }
    const arr = new Uint16Array(idx);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, idxBuffer);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, arr, gl.DYNAMIC_DRAW);
    return arr.length;
  }

  /* Build line index pairs from all active constraints (for gl.LINES grid pass).
     Returns the number of indices uploaded. */
  function buildAndUploadLineIndices(cloth) {
    const idx = [];
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        if (col < COLS - 1) {
          const c = cloth.hLinks[row][col];
          if (c && c.active) idx.push(row * COLS + col, row * COLS + col + 1);
        }
        if (row < ROWS - 1) {
          const c = cloth.vLinks[row][col];
          if (c && c.active) idx.push(row * COLS + col, (row + 1) * COLS + col);
        }
      }
    }
    const arr = new Uint16Array(idx);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, lineIdxBuffer);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, arr, gl.DYNAMIC_DRAW);
    return arr.length;
  }

  /* Upload per-vertex dirt intensity (0→1) */
  function buildAndUploadDirt(cloth) {
    const dirt = new Float32Array(cloth.points.length);
    const pts = cloth.points;
    for (let i = 0; i < dirtParticles.length; i++) {
      const p = dirtParticles[i];
      if (p.attached) {
        const idx = pts.indexOf(p.attached);
        if (idx !== -1) {
          // Increase primary vertex intensity
          dirt[idx] = Math.min(1.0, dirt[idx] + 0.85);
          
          // Spread to neighbors to break the "single dot" vertex look
          const r = Math.floor(idx / COLS);
          const c = idx % COLS;
          for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
              if (dr === 0 && dc === 0) continue;
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                const nIdx = nr * COLS + nc;
                dirt[nIdx] = Math.min(1.0, dirt[nIdx] + 0.42);
              }
            }
          }
        }
      }
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, dirtBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, dirt, gl.DYNAMIC_DRAW);
  }

  /* Upload per-vertex wetness intensity (0→1) */
  function buildAndUploadWetness(cloth) {
    const wet = new Float32Array(cloth.points.length);
    const pts = cloth.points;
    for (let i = 0; i < pts.length; i++) {
      wet[i] = pointWetness.get(pts[i]) || 0;
    }
    gl.bindBuffer(gl.ARRAY_BUFFER, wetnessBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, wet, gl.DYNAMIC_DRAW);
  }

  /* ── Texture state ── */
  let glTexture  = null;
  let hasTexture = false;
  let texObjURL  = null;

  function loadGLTexture(img) {
    if (!glTexture) glTexture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, glTexture);
    /* Flip image so UV (0,0) = top-left matches our row=0 origin */
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    hasTexture = true;
  }

  texUploadBtn.addEventListener('click', () => texFile.click());

  texFile.addEventListener('change', () => {
    const file = texFile.files[0];
    if (!file) return;
    if (texObjURL) { URL.revokeObjectURL(texObjURL); texObjURL = null; }
    const url = URL.createObjectURL(file);
    texObjURL = url;
    const img = new Image();
    img.onload = () => {
      loadGLTexture(img);
      cloth    = makeCloth();
      buildUVBuffer();
      tearMode = false;
      dirtMode = false;
      waterMode = false;
      dirtParticles.length  = 0;
      waterParticles.length = 0;
      pointWetness.clear();
      updateHUD();
      texClear.classList.add('visible');
    };
    img.src = url;
  });

  texClear.addEventListener('click', () => {
    hasTexture = false;
    if (glTexture) { gl.deleteTexture(glTexture); glTexture = null; }
    texFile.value = '';
    texClear.classList.remove('visible');
    if (texObjURL) { URL.revokeObjectURL(texObjURL); texObjURL = null; }
    cloth    = makeCloth();
    buildUVBuffer();
    tearMode  = false;
    dirtMode  = false;
    waterMode = false;
    dirtParticles.length  = 0;
    waterParticles.length = 0;
    pointWetness.clear();
    updateHUD();
  });

  /* ── Perspective MVP matrix (column-major Float32Array for gl.uniformMatrix4fv) ──
     Camera at (cx, cy, -d) looking in +Z, Y-down world, FOV 60°.
     MV transform: cam_x = wx-cx, cam_y = cy-wy (flip Y), cam_z = wz-d
     Combined P*MV is precomputed here each resize.                          */
  function buildMVP(cw, ch) {
    const cx = cw * 0.5, cy = ch * 0.5;
    const fovY = Math.PI / 3;          // 60 degrees
    const tHalf = Math.tan(fovY * 0.5);
    const d  = cy / tHalf;             // camera distance — canvas fills the view at z=0
    const f  = 1.0 / tHalf;
    const fa = f * ch / cw;            // f / aspect
    const np = d * 0.01, fp = d * 20;
    const nf = 1.0 / (np - fp);
    const z33   = (fp + np) * nf;      // (fp+np)/(np-fp)
    const z34   = 2 * fp * np * nf;    // 2*fp*np/(np-fp)
    const col3z = z33 * (-d) + z34;    // z clip value for the cloth plane at world-z=0
    return new Float32Array([
      fa,        0,      0,  0,
       0,       -f,      0,  0,
       0,        0,    z33, -1,
      -fa * cx, f * cy, col3z, d
    ]);
  }

  /* ── Resize ── */
  function resize() {
    let cw, ch;
    if (isMobile()) {
      const headerH = mobHeader.offsetHeight;
      const navH    = mobNav.offsetHeight;
      cw = window.innerWidth;
      ch = window.innerHeight - headerH - navH;
      canvas.style.cssText  = `position:fixed;top:${headerH}px;left:0;width:${cw}px;height:${ch}px;z-index:1`;
      overlay.style.cssText = `position:fixed;top:${headerH}px;left:0;width:${cw}px;height:${ch}px;z-index:2;pointer-events:none`;
      document.body.style.overflow = 'hidden';
    } else {
      const panelW = 280;
      cw = window.innerWidth - panelW;
      ch = window.innerHeight;
      canvas.style.cssText  = `position:fixed;top:0;left:${panelW}px;width:${cw}px;height:${ch}px;`;
      overlay.style.cssText = `position:fixed;top:0;left:${panelW}px;width:${cw}px;height:${ch}px;pointer-events:none;display:block`;
      document.body.style.overflow = '';
    }
    canvas.width   = cw;
    canvas.height  = ch;
    overlay.width  = cw;
    overlay.height = ch;
    gl.viewport(0, 0, cw, ch);
    gl.useProgram(prog);
    gl.uniformMatrix4fv(uMVPLoc, false, buildMVP(cw, ch));
  }
  window.addEventListener('resize', resize);
  resize();

  /* ── Cloth init ── */
  function makeCloth() {
    const clothWidth = (COLS - 1) * SPACING;
    const originX    = Math.round((canvas.width  - clothWidth) / 2);
    const originY    = Math.round(canvas.height  * 0.08);
    return new Cloth(originX, originY, pinConfig); // pass current pinConfig so Z gradient matches pin axis
  }

  /* ── Scenario state — must be declared before makeCloth() which reads pinConfig ── */
  let pinConfig      = 'top-row'; // 'top-row' | 'left-col' | 'top-corners'


  let cloth = makeCloth();
  buildUVBuffer();

  /* ── Microphone audio analysis ── */
  let micAnalyser = null;
  let micData     = null;
  /* Mic is NOT auto-started — only activated when the user taps the Mic button */

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  let windEnabled   = false; // stays off by default — satisfies prefers-reduced-motion
  let tearMode      = false;
  let dirtMode      = false;
  let waterMode     = false;
  const dirtParticles  = [];  // { x,y,vx,vy,r,hue,lightness,attached:Point|null,opacity }
  const waterParticles = [];  // { x,y,vx,vy,r,opacity } — splash, fade, vanish
  const pointWetness   = new Map(); // Point → wetness 0–1 (cleared on reset)
  let windPhase     = 0;
  let windMult      = 1.0;   // wind strength multiplier (1.0 = default, set by scenario)
  let mouse         = { x: 0, y: 0, down: false };
  let draggedPoint  = null;
  let grainOn       = false;
  let isKorean      = false; // set true in i18n block; used for dynamic badge text

  /* ── Collider state ── */
  const COLLIDER_NONE = 0, COLLIDER_BALL = 1, COLLIDER_ROD = 2;
  let colliderType    = COLLIDER_NONE;
  let ballCollider    = { x: 0, y: 0, r: 55 };
  let rodCollider     = { x: 0, y: 0, angle: 0, len: 150, r: 16 };
  let draggedCollider = null; // 'ball' | 'rod-body' | 'rod-e1' | 'rod-e2'

  /* Emit a burst of dirt particles from canvas-local position (px, py) */
  function emitDirt(px, py) {
    const count = 14 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3.5;
      dirtParticles.push({
        x:        px + (Math.random() - 0.5) * 12,
        y:        py + (Math.random() - 0.5) * 12,
        vx:       Math.cos(angle) * speed,
        vy:       Math.sin(angle) * speed - 2.0,  // bias slightly upward for arc
        r:        1.8 + Math.random() * 3.5,      // varied sizes
        rot:      Math.random() * Math.PI * 2,    // random rotation for 'spots'
        ecc:      0.6 + Math.random() * 0.4,      // eccentricity for non-circularity
        hue:      25 + Math.floor(Math.random() * 25),   // 25–50 = earthy brown/tan
        lightness:18 + Math.floor(Math.random() * 22),   // 18–40 %
        attached: null,
        opacity:  1.0,
      });
    }
  }

  /* Emit a burst of water droplets from canvas-local position (px, py) */
  function emitWater(px, py) {
    const count = 12 + Math.floor(Math.random() * 7);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2.0 + Math.random() * 4.5;  // faster than dirt — water is lighter
      waterParticles.push({
        x:      px + (Math.random() - 0.5) * 10,
        y:      py + (Math.random() - 0.5) * 10,
        vx:     Math.cos(angle) * speed,
        vy:     Math.sin(angle) * speed - 2.5,
        r:      1.5 + Math.random() * 2.5,
        rot:    angle + Math.PI * 0.5,
        ecc:    0.5 + Math.random() * 0.3,
        opacity: 0.85 + Math.random() * 0.15,
        absorbed: false,
      });
    }
  }

  let hudHidden    = false;
  let hudPeekTimer = null;
  let glowPos      = null;
  let glowAt       = 0;

  /* Convert a viewport-relative clientX/Y into canvas-local coordinates.
     The canvas starts at x=280px on desktop and is offset by the header on mobile,
     so we always subtract its bounding rect to get the correct local position. */
  function canvasPos(clientX, clientY) {
    const r = canvas.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top };
  }

  /* ── Mouse ── */
  /* Helper: test whether (mx,my) hits a collider; sets draggedCollider; returns true if hit */
  function tryGrabCollider(mx, my) {
    if (colliderType === COLLIDER_BALL) {
      const dx = mx - ballCollider.x, dy = my - ballCollider.y;
      if (dx*dx + dy*dy < (ballCollider.r + 14) * (ballCollider.r + 14)) {
        draggedCollider = 'ball';
        return true;
      }
    } else if (colliderType === COLLIDER_ROD) {
      const cos = Math.cos(rodCollider.angle), sin = Math.sin(rodCollider.angle);
      const hlen = rodCollider.len * 0.5;
      /* Check endpoints first (for rotation drag) */
      const e1x = rodCollider.x + cos * hlen, e1y = rodCollider.y + sin * hlen;
      const e2x = rodCollider.x - cos * hlen, e2y = rodCollider.y - sin * hlen;
      const d1 = (mx-e1x)*(mx-e1x)+(my-e1y)*(my-e1y);
      const d2 = (mx-e2x)*(mx-e2x)+(my-e2y)*(my-e2y);
      const endR2 = (rodCollider.r + 18) * (rodCollider.r + 18);
      if (d1 < endR2) { draggedCollider = 'rod-e1'; return true; }
      if (d2 < endR2) { draggedCollider = 'rod-e2'; return true; }
      /* Check body (capsule hit) */
      const dx = mx - rodCollider.x, dy = my - rodCollider.y;
      const t  = Math.max(-hlen, Math.min(hlen, dx*cos + dy*sin));
      const cx = rodCollider.x + t*cos, cy = rodCollider.y + t*sin;
      const bodyR = rodCollider.r + 14;
      if ((mx-cx)*(mx-cx)+(my-cy)*(my-cy) < bodyR*bodyR) {
        draggedCollider = 'rod-body';
        return true;
      }
    }
    return false;
  }

  canvas.addEventListener('mousedown', e => {
    mouse.down = true;
    const pos  = canvasPos(e.clientX, e.clientY);
    mouse.x = pos.x;
    mouse.y = pos.y;
    if (dirtMode)        emitDirt(mouse.x, mouse.y);
    else if (waterMode)  emitWater(mouse.x, mouse.y);
    else if (colliderType !== COLLIDER_NONE && tryGrabCollider(mouse.x, mouse.y)) { /* collider drag */ }
    else if (!tearMode)  draggedPoint = cloth.nearestPoint(mouse.x, mouse.y);
  });

  canvas.addEventListener('mousemove', e => {
    const pos = canvasPos(e.clientX, e.clientY);
    const prevMX = mouse.x, prevMY = mouse.y;
    mouse.x = pos.x;
    mouse.y = pos.y;
    if (tearMode) cloth.tearNear(mouse.x, mouse.y);
    if (mouse.down && waterMode) emitWater(mouse.x, mouse.y);
    if (mouse.down && dirtMode)  emitDirt(mouse.x, mouse.y);
    if (mouse.down && draggedPoint && !tearMode) {
      draggedPoint.x     = mouse.x;
      draggedPoint.y     = mouse.y;
      draggedPoint.prevX = mouse.x;
      draggedPoint.prevY = mouse.y;
    }
    /* Collider drag */
    if (mouse.down && draggedCollider) {
      if (draggedCollider === 'ball') {
        ballCollider.x = mouse.x;
        ballCollider.y = mouse.y;
      } else if (draggedCollider === 'rod-body') {
        rodCollider.x += mouse.x - prevMX;
        rodCollider.y += mouse.y - prevMY;
      } else if (draggedCollider === 'rod-e1' || draggedCollider === 'rod-e2') {
        /* Rotate: compute new angle from rod center to dragged endpoint */
        const dx = mouse.x - rodCollider.x, dy = mouse.y - rodCollider.y;
        rodCollider.angle = Math.atan2(dy, dx);
        if (draggedCollider === 'rod-e2') rodCollider.angle += Math.PI;
        rodCollider.len = Math.max(60, Math.min(300, Math.sqrt(dx*dx+dy*dy) * 2));
      }
    }
  });

  canvas.addEventListener('mouseup', () => {
    if (draggedPoint) { glowPos = { x: draggedPoint.x, y: draggedPoint.y }; glowAt = performance.now(); }
    mouse.down = false; draggedPoint = null; draggedCollider = null;
  });
  canvas.addEventListener('mouseleave', () => {
    if (draggedPoint) { glowPos = { x: draggedPoint.x, y: draggedPoint.y }; glowAt = performance.now(); }
    mouse.down = false; draggedPoint = null; draggedCollider = null;
  });

  /* ── Touch ── */
  function touchPos(e) {
    return e.touches.length
      ? { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }
      : { clientX: mouse.x, clientY: mouse.y };
  }
  canvas.addEventListener('touchstart', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', touchPos(e))); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', touchPos(e))); }, { passive: false });
  canvas.addEventListener('touchend',   e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup')); },               { passive: false });

  /* ── Keyboard ── */
  window.addEventListener('keydown', e => {
    switch (e.key.toUpperCase()) {
      case 'T':
        tearMode = !tearMode;
        if (tearMode) { dirtMode = false; waterMode = false; cloth.tearNear(mouse.x, mouse.y); }
        updateHUD();
        break;
      case 'D':
        dirtMode = !dirtMode;
        if (dirtMode) { tearMode = false; waterMode = false; }
        updateHUD();
        break;
      case 'C':
        waterMode = !waterMode;
        if (waterMode) { tearMode = false; dirtMode = false; }
        updateHUD();
        break;
      case 'O':
        colliderType = (colliderType + 1) % 3;
        if (colliderType === COLLIDER_BALL) {
          ballCollider.x = overlay.width / 2;
          ballCollider.y = overlay.height / 2;
        } else if (colliderType === COLLIDER_ROD) {
          rodCollider.x = overlay.width / 2;
          rodCollider.y = overlay.height / 2;
          rodCollider.angle = 0;
          rodCollider.len   = 150;
        }
        updateHUD();
        break;
      case 'R':
        pinConfig    = 'top-row';
        windMult     = 1.0;

        cloth        = makeCloth();
        buildUVBuffer();
        windEnabled  = false;
        tearMode     = false;
        dirtMode     = false;
        waterMode    = false;
        dirtParticles.length  = 0;
        waterParticles.length = 0;
        pointWetness.clear();
        syncScenarioUI(null);
        updateHUD();
        break;
      case 'W':
        windEnabled = !windEnabled;
        updateHUD();
        break;
      case 'S': saveImage(); break;
      case 'G':
        grainOn = !grainOn;
        document.getElementById('grain-overlay').classList.toggle('active', grainOn);
        updateHUD();
        break;
      case 'H':
        if (!isMobile()) {
          hudHidden = !hudHidden;
          hud.classList.toggle('hud-hidden', hudHidden);
        }
        break;
    }
  });

  /* ── HUD proximity reveal — hover near left edge while hidden ── */
  if (!isMobile()) {
    window.addEventListener('mousemove', e => {
      if (hudHidden && e.clientX < 80) {
        hud.classList.remove('hud-hidden');
        clearTimeout(hudPeekTimer);
        hudPeekTimer = setTimeout(() => {
          if (hudHidden) hud.classList.add('hud-hidden');
        }, 2000);
      }
    });
  }

  /* ── Save image — shared by keyboard shortcut + mobile button ── */
  function saveImage() {
    const off    = document.createElement('canvas');
    off.width    = canvas.width;
    off.height   = canvas.height;
    const offCtx = off.getContext('2d');
    offCtx.drawImage(canvas,  0, 0);
    offCtx.drawImage(overlay, 0, 0);
    const dataURL = off.toDataURL('image/png');
    const link    = document.createElement('a');
    link.href     = dataURL;
    link.download = `fabric-${Date.now()}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  const elCollider = document.getElementById('modeCollider');

  /* ── HUD badges + mobile button active states ── */
  function updateHUD() {
    elWind    .classList.toggle('visible', windEnabled);
    elTear    .classList.toggle('visible', tearMode);
    elMic     .classList.toggle('visible', windEnabled && micAnalyser !== null);
    elGrain   .classList.toggle('visible', grainOn);
    elDirt    .classList.toggle('visible', dirtMode);
    elWater   .classList.toggle('visible', waterMode);
    elCollider.classList.toggle('visible', colliderType !== COLLIDER_NONE);
    if (colliderType !== COLLIDER_NONE) {
      elCollider.textContent = colliderType === COLLIDER_BALL
        ? (isKorean ? '공' : 'BALL')
        : (isKorean ? '막대' : 'ROD');
    }
    if (isMobile()) {
      /* Nav direct-mode buttons */
      mobTear .classList.toggle('mode-on', tearMode);
      mobDirt .classList.toggle('mode-on', dirtMode);
      mobWater.classList.toggle('mode-on', waterMode);
      mobWind .classList.toggle('mode-on', windEnabled);
      mobTear .setAttribute('aria-pressed', String(tearMode));
      mobDirt .setAttribute('aria-pressed', String(dirtMode));
      mobWater.setAttribute('aria-pressed', String(waterMode));
      mobWind .setAttribute('aria-pressed', String(windEnabled));
      mobTear .setAttribute('aria-current', tearMode ? 'page' : 'false');
      mobDirt .setAttribute('aria-current', dirtMode ? 'page' : 'false');
      mobWater.setAttribute('aria-current', waterMode ? 'page' : 'false');
      mobWind .setAttribute('aria-current', windEnabled ? 'page' : 'false');
      /* More button dot — on when Grain, Collider or Mic is active */
      mobMore .classList.toggle('mode-on', grainOn || colliderType !== COLLIDER_NONE || micAnalyser !== null);
      /* More sheet toggles */
      fxGrain   .classList.toggle('active', grainOn);
      fxCollider.classList.toggle('active', colliderType !== COLLIDER_NONE);
      fxMicBtn  .classList.toggle('active', micAnalyser !== null);
      fxGrain   .setAttribute('aria-pressed', String(grainOn));
      fxCollider.setAttribute('aria-pressed', String(colliderType !== COLLIDER_NONE));
    } else {
      /* Desktop HUD shortcut rows — inline active state + aria-pressed */
      const rowTear     = document.getElementById('hudRowTear');
      const rowDirt     = document.getElementById('hudRowDirt');
      const rowWater    = document.getElementById('hudRowWater');
      const rowCollider = document.getElementById('hudRowCollider');
      const rowWind     = document.getElementById('hudRowWind');
      const rowGrain    = document.getElementById('hudRowGrain');
      rowTear    .classList.toggle('row-on', tearMode);
      rowDirt    .classList.toggle('row-on', dirtMode);
      rowWater   .classList.toggle('row-on', waterMode);
      rowCollider.classList.toggle('row-on', colliderType !== COLLIDER_NONE);
      rowWind    .classList.toggle('row-on', windEnabled);
      rowGrain   .classList.toggle('row-on', grainOn);
      rowTear    .setAttribute('aria-pressed', String(tearMode));
      rowDirt    .setAttribute('aria-pressed', String(dirtMode));
      rowWater   .setAttribute('aria-pressed', String(waterMode));
      rowCollider.setAttribute('aria-pressed', String(colliderType !== COLLIDER_NONE));
      rowWind    .setAttribute('aria-pressed', String(windEnabled));
      rowGrain   .setAttribute('aria-pressed', String(grainOn));
      rowTear    .setAttribute('aria-current', tearMode ? 'page' : 'false');
      rowDirt    .setAttribute('aria-current', dirtMode ? 'page' : 'false');
      rowWater   .setAttribute('aria-current', waterMode ? 'page' : 'false');
      rowCollider.setAttribute('aria-current', colliderType !== COLLIDER_NONE ? 'page' : 'false');
      rowWind    .setAttribute('aria-current', windEnabled ? 'page' : 'false');
      rowGrain   .setAttribute('aria-current', grainOn ? 'page' : 'false');
    }
  }

  /* ── Mobile button handlers ── */
  if (isMobile()) {
    /* Sheet open / close */
    function openFxSheet() {
      fxSheet   .classList.add('open');
      fxBackdrop.classList.add('open');
      fxBackdrop.removeAttribute('aria-hidden');
      fxSheet.setAttribute('aria-hidden', 'false');
      mobMore.setAttribute('aria-expanded', 'true');
      const first = fxSheet.querySelector('button, [tabindex="0"]');
      if (first) first.focus();
    }
    function closeFxSheet() {
      fxSheet   .classList.remove('open');
      fxBackdrop.classList.remove('open');
      fxBackdrop.setAttribute('aria-hidden', 'true');
      fxSheet.setAttribute('aria-hidden', 'true');
      mobMore.setAttribute('aria-expanded', 'false');
      mobMore.focus();
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && fxSheet.classList.contains('open')) closeFxSheet();
    });

    /* Nav direct toggles */
    mobTear .addEventListener('click', () => { tearMode  = !tearMode;  if (tearMode)  { dirtMode = false; waterMode = false; } updateHUD(); });
    mobDirt .addEventListener('click', () => { dirtMode  = !dirtMode;  if (dirtMode)  { tearMode = false; waterMode = false; } updateHUD(); });
    mobWater.addEventListener('click', () => { waterMode = !waterMode; if (waterMode) { tearMode = false; dirtMode  = false; } updateHUD(); });
    mobWind .addEventListener('click', () => { windEnabled = !windEnabled; updateHUD(); });
    mobMore .addEventListener('click', openFxSheet);
    fxBackdrop.addEventListener('click', closeFxSheet);

    /* Sheet: more effect toggles */
    fxGrain.addEventListener('click', () => {
      grainOn = !grainOn;
      document.getElementById('grain-overlay').classList.toggle('active', grainOn);
      updateHUD();
    });

    /* Sheet: utility actions */
    fxReset.addEventListener('click', () => {
      closeFxSheet();
      pinConfig      = 'top-row';
      windMult       = 1.0;

      cloth          = makeCloth();
      buildUVBuffer();
      windEnabled = false;
      tearMode    = false;
      dirtMode    = false;
      waterMode   = false;
      dirtParticles.length  = 0;
      waterParticles.length = 0;
      pointWetness.clear();
      syncScenarioUI(null);
      updateHUD();
    });
    fxSaveBtn  .addEventListener('click', () => { closeFxSheet(); saveImage(); });
    fxUploadBtn2.addEventListener('click', () => { closeFxSheet(); texFile.click(); });
    fxMicBtn   .addEventListener('click', () => {
      if (micAnalyser) return;
      navigator.mediaDevices.getUserMedia({ audio: true, video: false })
        .then(stream => {
          const audioCtx  = new AudioContext();
          const source    = audioCtx.createMediaStreamSource(stream);
          micAnalyser     = audioCtx.createAnalyser();
          micAnalyser.fftSize = 256;
          micData         = new Uint8Array(micAnalyser.frequencyBinCount);
          source.connect(micAnalyser);
          if (!windEnabled) { windEnabled = true; }
          updateHUD();
        })
        .catch(() => { /* permission denied */ });
    });
  }

  /* ── Desktop HUD — clickable shortcut rows ── */
  if (!isMobile()) {
    document.querySelectorAll('#hud .hud-act').forEach(row => {
      const trigger = () => {
        const key = row.dataset.hudKey;
        if (key) window.dispatchEvent(new KeyboardEvent('keydown', { key, bubbles: true }));
      };
      row.addEventListener('click', trigger);
      row.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(); }
      });
    });
  }

  /* ── Fabric preset buttons ── */
  const presetBtns  = document.querySelectorAll('.preset-btn');
  const presetReset = document.getElementById('presetReset');

  /* Sync all preset UI (desktop buttons + mobile sheet rows) for a given key (null = default) */
  function syncPresetUI(key) {
    presetBtns.forEach(b => b.classList.toggle('active', b.dataset.preset === key));
    presetReset.classList.toggle('visible', key !== null);
    /* Mobile bottom sheet texture rows */
    fxSilk   .classList.toggle('active', key === 'SILK');
    fxDenim  .classList.toggle('active', key === 'DENIM');
    fxLinen  .classList.toggle('active', key === 'LINEN');
    fxDefault.classList.toggle('visible', key !== null);
  }

  /* Apply a named preset (shared by desktop and mobile) */
  function applyPreset(key) {
    const preset = PRESETS[key];
    if (!preset) return;
    gravity      = preset.gravity;
    iterations   = preset.iterations;
    tearDist     = preset.tearDist;
    damping      = preset.damping;
    windResponse = preset.windResponse;
    stickiness   = preset.stickiness;
    dryRate      = preset.dryRate;
    dirtParticles.length  = 0;
    waterParticles.length = 0;
    pointWetness.clear();
    clothColor = (PREFERS_DARK && preset.colorDark)
      ? preset.colorDark.slice()
      : preset.color.slice();
    lineAlpha  = (PREFERS_DARK && preset.lineAlphaDark != null)
      ? preset.lineAlphaDark
      : preset.lineAlpha;
    cloth.reset();
    activePreset = key;
    syncPresetUI(key);
  }

  function applyDefaultCloth() {
    gravity      = DEFAULT_GRAVITY;
    iterations   = DEFAULT_ITERATIONS;
    tearDist     = DEFAULT_TEAR_DIST;
    damping      = DEFAULT_DAMPING;
    windResponse = DEFAULT_WIND_RESPONSE;
    stickiness   = DEFAULT_STICKINESS;
    dryRate      = DEFAULT_DRY_RATE;
    dirtParticles.length  = 0;
    waterParticles.length = 0;
    pointWetness.clear();
    clothColor   = DEFAULT_COLOR.slice();
    lineAlpha    = DEFAULT_LINE_ALPHA;
    cloth.reset();
    activePreset = null;
    syncPresetUI(null);
  }

  presetBtns.forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });

  presetReset.addEventListener('click', applyDefaultCloth);

  /* Mobile bottom sheet texture handlers */
  [fxSilk, fxDenim, fxLinen].forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.fxPreset));
  });
  fxDefault.addEventListener('click', applyDefaultCloth);

  /* ── Pin config ── */
  function applyPinConfig(c, config) {
    for (let row = 0; row < ROWS; row++) {
      for (let col = 0; col < COLS; col++) {
        const pt = c.points[row * COLS + col];
        switch (config) {
          case 'left-col':    pt.pinned = (col === 0); break;
          case 'top-corners': pt.pinned = (row === 0 && (col === 0 || col === COLS - 1)); break;
          case 'corners':     pt.pinned = ((row === 0 || row === ROWS - 1) && (col === 0 || col === COLS - 1)); break;
          default:            pt.pinned = (row === 0); break;
        }
        if (pt.pinned) { pt.initX = pt.x; pt.initY = pt.y; pt.initZ = pt.z; }
      }
    }
  }


  fxCollider.addEventListener('click', () => {
    colliderType = (colliderType + 1) % 3;
    if (colliderType === COLLIDER_BALL) {
      ballCollider.x = overlay.width / 2;
      ballCollider.y = overlay.height / 2;
    } else if (colliderType === COLLIDER_ROD) {
      rodCollider.x = overlay.width / 2;
      rodCollider.y = overlay.height / 2;
      rodCollider.angle = 0; rodCollider.len = 150;
    }
    updateHUD();
  });

  /* ── WebGL GL state setup ── */
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.enable(gl.DEPTH_TEST);   // correct self-overlap occlusion on folded cloth
  gl.depthFunc(gl.LEQUAL);
  /* Our MVP matrix flips Y (world Y-down → clip Y-up), which reverses triangle winding.
     Triangles that are CW in world space become CW in clip space after the flip, so we must
     tell WebGL that CW = front-face (default is CCW).  Without this, gl_FrontFacing is
     inverted: the visible cloth face tests as back-facing, making it darker via Task #27. */
  gl.frontFace(gl.CW);
  setBgPalette('DEFAULT');          // prime gradient before first frame

  /* ── Main loop ── */
  function loop() {
    requestAnimationFrame(loop);

    /* Wind */
    let windX = 0, windZ = 0;
    if (windEnabled) {
      if (micAnalyser) {
        micAnalyser.getByteFrequencyData(micData);
        let sum = 0;
        for (let i = 0; i < micData.length; i++) sum += micData[i];
        const avg = sum / micData.length;
        windX = (avg / 255) * 3 * windMult;
        windZ = windX * 0.55; // microphone wind also billows cloth toward viewer
        elMicMeter.style.width = Math.round((avg / 255) * 40) + 'px';
      } else {
        windPhase += WIND_SPEED;
        windX = Math.sin(windPhase) * WIND_STRENGTH * windMult;
        windZ = Math.cos(windPhase) * WIND_STRENGTH * windMult * 0.6; // Z slightly behind X phase
      }
    }

    /* Physics */
    cloth.update(windX * windResponse, windZ * windResponse);

    /* ── Collider resolution — push cloth points outside each collider ── */
    if (colliderType !== COLLIDER_NONE) {
      const pts = cloth.points;
      for (let i = 0; i < pts.length; i++) {
        const pt = pts[i];
        if (pt.pinned) continue;
        if (colliderType === COLLIDER_BALL) {
          /* Full 3D sphere collision — ball lives at Z=0 in world space */
          const bz = 0;
          const dx = pt.x - ballCollider.x, dy = pt.y - ballCollider.y, dz = pt.z - bz;
          const d2 = dx * dx + dy * dy + dz * dz;
          if (d2 < ballCollider.r * ballCollider.r) {
            const dist = Math.sqrt(d2) || 0.001;
            const nx = dx / dist, ny = dy / dist, nz = dz / dist;
            pt.x = ballCollider.x + nx * ballCollider.r;
            pt.y = ballCollider.y + ny * ballCollider.r;
            pt.z = bz           + nz * ballCollider.r;
            const vx = pt.x - pt.prevX, vy = pt.y - pt.prevY, vz = pt.z - pt.prevZ;
            const vn = vx * nx + vy * ny + vz * nz;
            if (vn < 0) {
              pt.prevX = pt.x - (vx - vn * nx) * 0.82;
              pt.prevY = pt.y - (vy - vn * ny) * 0.82;
              pt.prevZ = pt.z - (vz - vn * nz) * 0.82;
            }
          }
        } else { /* ROD — 2D capsule, extended along Z (cylinder) */
          const cos = Math.cos(rodCollider.angle), sin = Math.sin(rodCollider.angle);
          const hlen = rodCollider.len * 0.5;
          const dx = pt.x - rodCollider.x, dy = pt.y - rodCollider.y;
          const t  = Math.max(-hlen, Math.min(hlen, dx * cos + dy * sin));
          const cx = rodCollider.x + t * cos, cy = rodCollider.y + t * sin;
          const ex = pt.x - cx, ey = pt.y - cy;
          const d2 = ex * ex + ey * ey;
          if (d2 < rodCollider.r * rodCollider.r) {
            const dist = Math.sqrt(d2) || 0.001;
            const nx = ex / dist, ny = ey / dist;
            pt.x = cx + nx * rodCollider.r;
            pt.y = cy + ny * rodCollider.r;
            /* Dampen Z velocity on rod contact (rod is infinite in Z) */
            pt.z    *= 0.9;
            pt.prevZ = pt.z - (pt.z - pt.prevZ) * 0.82;
            const vx = pt.x - pt.prevX, vy = pt.y - pt.prevY;
            const vn = vx * nx + vy * ny;
            if (vn < 0) { pt.prevX = pt.x - (vx - vn * nx) * 0.82; pt.prevY = pt.y - (vy - vn * ny) * 0.82; }
          }
        }
      }
    }

    /* ── Dirt particle physics ── */
    if (dirtParticles.length > 0) {
      const snapRadius = 14;
      const pts        = cloth.points;
      for (let i = dirtParticles.length - 1; i >= 0; i--) {
        const p = dirtParticles[i];
        if (p.attached) {
          /* Follow the cloth point */
          p.x = p.attached.x;
          p.y = p.attached.y;
          /* Water loosens stuck dirt proportional to local wetness */
          const wet = pointWetness.get(p.attached) || 0;
          if (wet > 0 && Math.random() < Math.min(0.95, wet * (1 - stickiness) * 0.9)) {
            p.vx = (Math.random() - 0.5) * 2.5;
            p.vy = 1.5 + Math.random() * 3.0;   // strong downward kick — escape snap zone
            p.attached = null;
            p.noAttach = 90;                      // 90-frame cooldown before re-stick allowed
          }
          /* Wind can shake loose low-stickiness particles */
          if (p.attached && windEnabled && Math.abs(windX) > 0.3) {
            if (Math.random() < Math.abs(windX) * (1 - stickiness) * 0.06) {
              p.vx = windX * 2 + (Math.random() - 0.5);
              p.vy = -1 - Math.random();
              p.attached = null;
            }
          }
        } else {
          /* Airborne — apply gravity + light air drag */
          if (p.noAttach > 0) p.noAttach--;
          p.vy += 0.28;
          p.vx *= 0.97;
          p.vy *= 0.97;
          p.x  += p.vx;
          p.y  += p.vy;

          /* Remove if off canvas */
          if (p.y > overlay.height + 20 || p.x < -20 || p.x > overlay.width + 20) {
            dirtParticles.splice(i, 1);
            continue;
          }

          /* Only try to re-stick when the water-release cooldown has expired */
          if (!p.noAttach) {
            let nearest = null, nearestDist = snapRadius;
            for (let j = 0; j < pts.length; j++) {
              const pt = pts[j];
              const dx = p.x - pt.x, dy = p.y - pt.y;
              const d  = Math.sqrt(dx * dx + dy * dy);
              if (d < nearestDist) { nearestDist = d; nearest = pt; }
            }
            if (nearest) {
              if (Math.random() < stickiness) {
                p.attached = nearest;
                p.vx = 0; p.vy = 0;
              } else {
                p.vy *= -0.35;
                p.vx *= 0.5;
              }
            }
          }
        }
      }
    }

    /* ── Water particle physics + wetness decay ── */
    {
      const snapRadius = 18;
      const pts        = cloth.points;
      const windExtra  = windEnabled ? Math.abs(windX) * 0.004 : 0;

      /* Decay all wetness (wind accelerates drying) */
      for (const [pt, w] of pointWetness) {
        const next = w - dryRate - windExtra;
        if (next <= 0.001) pointWetness.delete(pt);
        else               pointWetness.set(pt, next);
      }

      /* Advance water particles */
      for (let i = waterParticles.length - 1; i >= 0; i--) {
        const p = waterParticles[i];

        if (p.absorbed) {
          /* Fade out after absorption */
          p.opacity -= 0.055;
          if (p.opacity <= 0) { waterParticles.splice(i, 1); }
          continue;
        }

        /* Airborne — lighter gravity, stronger wind carry */
        p.vy += 0.18;
        p.vx += windEnabled ? windX * 0.04 : 0;
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.x  += p.vx;
        p.y  += p.vy;

        /* Remove if off canvas bottom/sides */
        if (p.y > overlay.height + 20 || p.x < -20 || p.x > overlay.width + 20) {
          waterParticles.splice(i, 1);
          continue;
        }

        /* Check proximity to cloth points — absorb and add wetness */
        for (let j = 0; j < pts.length; j++) {
          const pt = pts[j];
          const dx = p.x - pt.x, dy = p.y - pt.y;
          if (dx * dx + dy * dy < snapRadius * snapRadius) {
            p.absorbed = true;

            /* Spread wetness to this point AND all cloth points within ~54px
               so the per-frame loosening also fires on nearby dirty points */
            const wetSpreadR2 = 54 * 54;
            for (let j2 = 0; j2 < pts.length; j2++) {
              const nb = pts[j2];
              const nx = nb.x - pt.x, ny = nb.y - pt.y;
              if (nx * nx + ny * ny < wetSpreadR2) {
                pointWetness.set(nb, Math.min(1, (pointWetness.get(nb) || 0) + 0.9));
              }
            }

            /* Instant burst: knock off dirt in a wide area around impact.
               Water cleans dirt regardless of material stickiness — chance is high. */
            const burstR2 = 85 * 85; // Wider cleaning area
            for (let k = dirtParticles.length - 1; k >= 0; k--) {
              const dp = dirtParticles[k];
              if (!dp.attached) continue;
              const bx = dp.attached.x - pt.x, by = dp.attached.y - pt.y;
              if (bx * bx + by * by < burstR2) {
                /* 1-2 sprays logic: high removal chance per droplet */
                if (Math.random() < 0.99) { 
                  dp.vx = (Math.random() - 0.5) * 4.0;
                  dp.vy = 2.0 + Math.random() * 4.0;
                  dp.attached = null;
                  dp.noAttach = 120;
                }
              }
            }
            break;
          }
        }
      }
    }

    /* ── WebGL render ── */
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    if (!isMobile()) {
      /* Draw animated gradient background */
      const bgTime  = performance.now() / 1000;
      const bgWind  = windEnabled ? Math.abs(Math.sin(windPhase)) : 0;
      gl.disable(gl.DEPTH_TEST);
      gl.useProgram(bgProg);
      gl.bindBuffer(gl.ARRAY_BUFFER, bgVBO);
      gl.enableVertexAttribArray(aBGPosLoc);
      gl.vertexAttribPointer(aBGPosLoc, 2, gl.FLOAT, false, 0, 0);
      gl.uniform3f(uBGTopLoc,  bgTopCurrent[0], bgTopCurrent[1], bgTopCurrent[2]);
      gl.uniform3f(uBGBotLoc,  bgBotCurrent[0], bgBotCurrent[1], bgBotCurrent[2]);
      gl.uniform1f(uBGTimeLoc, bgTime);
      gl.uniform1f(uBGWindLoc, bgWind);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      gl.disableVertexAttribArray(aBGPosLoc);
      gl.enable(gl.DEPTH_TEST);
      /* Clear only depth so cloth renders over gradient */
      gl.clear(gl.DEPTH_BUFFER_BIT);
    }

    gl.useProgram(prog);
    gl.uniform1i(uHasTextureLoc, hasTexture ? 1 : 0);
    gl.uniform3f(uClothColorLoc, ...clothColor);
    gl.uniform1f(uLineAlphaLoc,   lineAlpha);

    if (hasTexture && glTexture) {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, glTexture);
      gl.uniform1i(uTextureLoc, 0);
    }

    /* Upload positions (xyz — 3 floats per vertex) */
    uploadPositions(cloth);
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
    gl.enableVertexAttribArray(aPositionLoc);
    gl.vertexAttribPointer(aPositionLoc, 3, gl.FLOAT, false, 0, 0);

    /* Bind UV buffer */
    gl.bindBuffer(gl.ARRAY_BUFFER, uvBuffer);
    gl.enableVertexAttribArray(aUVLoc);
    gl.vertexAttribPointer(aUVLoc, 2, gl.FLOAT, false, 0, 0);

    /* Build and bind deformation shade buffer */
    buildAndUploadShade(cloth);
    gl.bindBuffer(gl.ARRAY_BUFFER, shadeBuffer);
    gl.enableVertexAttribArray(aShadeLoc);
    gl.vertexAttribPointer(aShadeLoc, 1, gl.FLOAT, false, 0, 0);

    /* Build and bind world-space normals */
    buildAndUploadNormals(cloth);
    gl.bindBuffer(gl.ARRAY_BUFFER, normalBuffer);
    gl.enableVertexAttribArray(aNormalLoc);
    gl.vertexAttribPointer(aNormalLoc, 3, gl.FLOAT, false, 0, 0);

    /* Build and bind dirt/wetness buffers */
    buildAndUploadDirt(cloth);
    gl.bindBuffer(gl.ARRAY_BUFFER, dirtBuffer);
    gl.enableVertexAttribArray(aDirtLoc);
    gl.vertexAttribPointer(aDirtLoc, 1, gl.FLOAT, false, 0, 0);

    buildAndUploadWetness(cloth);
    gl.bindBuffer(gl.ARRAY_BUFFER, wetnessBuffer);
    gl.enableVertexAttribArray(aWetnessLoc);
    gl.vertexAttribPointer(aWetnessLoc, 1, gl.FLOAT, false, 0, 0);

    /* Build index buffer (skips torn quads) and draw filled quads */
    gl.uniform1i(uIsLineLoc, 0);
    const indexCount = buildAndUploadIndices(cloth);
    if (!window.hasLoggedDraw) {
      console.info('First draw call indexCount:', indexCount);
      window.hasLoggedDraw = true;
    }
    if (indexCount > 0) {
      gl.drawElements(gl.TRIANGLES, indexCount, gl.UNSIGNED_SHORT, 0);
    }

    /* Grid lines — second pass, no-texture mode only */
    if (!hasTexture) {
      gl.uniform1i(uIsLineLoc, 1);
      const lineCount = buildAndUploadLineIndices(cloth);
      if (lineCount > 0) {
        gl.drawElements(gl.LINES, lineCount, gl.UNSIGNED_SHORT, 0);
      }
      gl.uniform1i(uIsLineLoc, 0);
    }

    /* ── Overlay: 2D decorations ── */
    ctx2d.clearRect(0, 0, overlay.width, overlay.height);

    /* ── Water particles (airborne droplets only) ── */
    if (waterParticles.length > 0) {
      ctx2d.save();
      for (let i = 0; i < waterParticles.length; i++) {
        const p = waterParticles[i];
        if (p.absorbed) continue; // Now handled by WebGL
        ctx2d.globalAlpha = p.opacity * 0.80;
        ctx2d.fillStyle   = PREFERS_DARK ? 'rgba(180,225,255,1)' : 'rgba(100,180,255,1)';
        ctx2d.beginPath();
        const rx = p.r;
        const ry = p.r * (p.ecc || 0.7);
        ctx2d.ellipse(p.x, p.y, rx, ry, p.rot || 0, 0, Math.PI * 2);
        ctx2d.fill();
      }
      ctx2d.restore();
    }

    /* ── Dirt particles (airborne only) ── */
    if (dirtParticles.length > 0) {
      ctx2d.save();
      for (let i = 0; i < dirtParticles.length; i++) {
        const p = dirtParticles[i];
        if (p.attached) continue; // Attached dirt is handled by WebGL on the cloth
        
        ctx2d.globalAlpha = p.opacity * 0.95;
        ctx2d.fillStyle   = `hsl(${p.hue}, 35%, ${p.lightness}%)`;
        
        // Draw as an irregular "spot" using an ellipse with eccentricity
        ctx2d.beginPath();
        const rx = p.r;
        const ry = p.r * (p.ecc || 0.8);
        ctx2d.ellipse(p.x, p.y, rx, ry, p.rot || 0, 0, Math.PI * 2);
        ctx2d.fill();
      }
      ctx2d.restore();
    }

    /* ── Hanger ── only for top-row pin config (not curtain/sail) */
    if (pinConfig === 'top-row') (function drawHanger() {
      const ptL  = cloth.points[0];
      const ptR  = cloth.points[COLS - 1];
      const bL   = ptL.x, bR = ptR.x, bY = ptL.y;
      const mx   = (bL + bR) / 2;
      const archH = Math.min(52, bY * 0.9);
      const peakY = bY - archH;
      
      ctx2d.save();
      
      /* Rich Wooden Gradient */
      const woodGrd = ctx2d.createLinearGradient(bL, bY, bR, bY);
      if (PREFERS_DARK) {
        woodGrd.addColorStop(0,   '#3a281b');
        woodGrd.addColorStop(0.2, '#5a3e2b');
        woodGrd.addColorStop(0.5, '#7a543a');
        woodGrd.addColorStop(0.8, '#5a3e2b');
        woodGrd.addColorStop(1,   '#3a281b');
      } else {
        woodGrd.addColorStop(0,   '#5d4037');
        woodGrd.addColorStop(0.3, '#8d6e63');
        woodGrd.addColorStop(0.5, '#a1887f');
        woodGrd.addColorStop(0.7, '#8d6e63');
        woodGrd.addColorStop(1,   '#5d4037');
      }

      /* Volumetric Shadow */
      ctx2d.shadowColor = 'rgba(0,0,0,0.4)';
      ctx2d.shadowBlur  = 12;
      ctx2d.shadowOffsetY = 6;

      ctx2d.strokeStyle = woodGrd;
      ctx2d.lineWidth   = 12;
      ctx2d.lineCap     = 'round';
      ctx2d.lineJoin    = 'round';

      /* Main wooden body */
      ctx2d.beginPath();
      ctx2d.moveTo(bL, bY);
      ctx2d.quadraticCurveTo(bL + (mx - bL) * 0.25, bY - archH * 0.35, mx, peakY);
      ctx2d.quadraticCurveTo(bR - (bR - mx) * 0.25, bY - archH * 0.35, bR, bY);
      ctx2d.stroke();

      /* Wood grain detail pass */
      ctx2d.shadowBlur = 0; ctx2d.shadowOffsetY = 0;
      ctx2d.lineWidth = 1.2;
      ctx2d.strokeStyle = 'rgba(0,0,0,0.12)';
      for (let i = -4; i <= 4; i += 2) {
        ctx2d.beginPath();
        ctx2d.moveTo(bL, bY + i);
        ctx2d.quadraticCurveTo(bL + (mx-bL)*0.25, bY - archH*0.35 + i, mx, peakY + i);
        ctx2d.quadraticCurveTo(bR - (bR-mx)*0.25, bY - archH*0.35 + i, bR, bY + i);
        ctx2d.stroke();
      }

      /* Metallic Brass Hook */
      const hookGrd = ctx2d.createLinearGradient(mx - 10, peakY - 30, mx + 10, peakY);
      if (PREFERS_DARK) {
        hookGrd.addColorStop(0, '#d4af37'); // Gold/Brass
        hookGrd.addColorStop(0.5, '#f9e79f'); // Highlight
        hookGrd.addColorStop(1, '#9a7d0a'); // Shadow
      } else {
        hookGrd.addColorStop(0, '#b8860b');
        hookGrd.addColorStop(0.5, '#ffd700');
        hookGrd.addColorStop(1, '#8b6508');
      }

      ctx2d.strokeStyle = hookGrd;
      ctx2d.lineWidth   = 3.5;
      ctx2d.lineCap     = 'round';
      
      /* Hook Stem */
      ctx2d.beginPath();
      ctx2d.moveTo(mx, peakY);
      ctx2d.lineTo(mx, peakY - 18);
      ctx2d.stroke();

      /* Hook Arc */
      ctx2d.beginPath();
      ctx2d.arc(mx + 7, peakY - 24, 9, Math.PI * 0.7, -Math.PI * 1.15, true);
      ctx2d.stroke();

      ctx2d.restore();
    })();



    /* ── Collider rendering ── */
    if (colliderType !== COLLIDER_NONE) {
      ctx2d.save();
      const cFill   = PREFERS_DARK ? 'rgba(55,58,68,0.88)'  : 'rgba(45,48,55,0.82)';
      const cStroke = PREFERS_DARK ? 'rgba(255,255,255,0.22)': 'rgba(255,255,255,0.38)';
      ctx2d.shadowColor = PREFERS_DARK ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.35)';
      ctx2d.shadowBlur  = 14;
      if (colliderType === COLLIDER_BALL) {
        ctx2d.beginPath();
        ctx2d.arc(ballCollider.x, ballCollider.y, ballCollider.r, 0, Math.PI * 2);
        ctx2d.fillStyle = cFill;
        ctx2d.fill();
        ctx2d.strokeStyle = cStroke;
        ctx2d.lineWidth   = 1.5;
        ctx2d.stroke();
        /* Specular highlight */
        ctx2d.shadowBlur = 0;
        const hlGrd = ctx2d.createRadialGradient(
          ballCollider.x - ballCollider.r * 0.3, ballCollider.y - ballCollider.r * 0.3, 0,
          ballCollider.x, ballCollider.y, ballCollider.r
        );
        hlGrd.addColorStop(0, 'rgba(255,255,255,0.18)');
        hlGrd.addColorStop(0.5, 'rgba(255,255,255,0)');
        ctx2d.fillStyle = hlGrd;
        ctx2d.beginPath();
        ctx2d.arc(ballCollider.x, ballCollider.y, ballCollider.r, 0, Math.PI * 2);
        ctx2d.fill();
      } else { /* ROD */
        const cos = Math.cos(rodCollider.angle), sin = Math.sin(rodCollider.angle);
        const hlen = rodCollider.len * 0.5, r = rodCollider.r;
        ctx2d.translate(rodCollider.x, rodCollider.y);
        ctx2d.rotate(rodCollider.angle);
        ctx2d.beginPath();
        ctx2d.arc(-hlen, 0, r, Math.PI / 2, -Math.PI / 2);
        ctx2d.lineTo(hlen, -r);
        ctx2d.arc(hlen, 0, r, -Math.PI / 2, Math.PI / 2);
        ctx2d.closePath();
        ctx2d.fillStyle = cFill;
        ctx2d.fill();
        ctx2d.strokeStyle = cStroke;
        ctx2d.lineWidth   = 1.5;
        ctx2d.stroke();
        /* Endpoint grip rings */
        ctx2d.shadowBlur = 0;
        ctx2d.strokeStyle = PREFERS_DARK ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.25)';
        ctx2d.lineWidth = 1;
        [-hlen, hlen].forEach(ex => {
          ctx2d.beginPath();
          ctx2d.arc(ex, 0, r - 4, 0, Math.PI * 2);
          ctx2d.stroke();
        });
      }
      ctx2d.restore();
    }

    /* Cursor glow — skip entirely when user prefers reduced motion */
    if (!prefersReducedMotion) {
      /* Active drag radial gradient */
      if (mouse.down && draggedPoint) {
        const grdA = ctx2d.createRadialGradient(
          draggedPoint.x, draggedPoint.y, 0,
          draggedPoint.x, draggedPoint.y, 52
        );
        grdA.addColorStop(0, 'rgba(255,255,255,0.28)');
        grdA.addColorStop(1, 'rgba(255,255,255,0)');
        ctx2d.save();
        ctx2d.fillStyle = grdA;
        ctx2d.beginPath();
        ctx2d.arc(draggedPoint.x, draggedPoint.y, 52, 0, Math.PI * 2);
        ctx2d.fill();
        ctx2d.restore();
      }

      /* Fade-out afterglow (400 ms) */
      if (glowPos && glowAt) {
        const elapsed = performance.now() - glowAt;
        if (elapsed < 400) {
          const alpha = 0.28 * (1 - elapsed / 400);
          const grdB = ctx2d.createRadialGradient(
            glowPos.x, glowPos.y, 0,
            glowPos.x, glowPos.y, 52
          );
          grdB.addColorStop(0, `rgba(255,255,255,${alpha.toFixed(3)})`);
          grdB.addColorStop(1, 'rgba(255,255,255,0)');
          ctx2d.save();
          ctx2d.fillStyle = grdB;
          ctx2d.beginPath();
          ctx2d.arc(glowPos.x, glowPos.y, 52, 0, Math.PI * 2);
          ctx2d.fill();
          ctx2d.restore();
        }
      }
    }

    /* Drag highlight dot */
    if (mouse.down && draggedPoint) {
      ctx2d.save();
      ctx2d.beginPath();
      ctx2d.arc(draggedPoint.x, draggedPoint.y, 5, 0, Math.PI * 2);
      ctx2d.fillStyle   = 'white';
      ctx2d.shadowColor = 'white';
      ctx2d.shadowBlur  = 15;
      ctx2d.fill();
      ctx2d.restore();
    }

    /* Tear cursor ring */
    if (tearMode) {
      ctx2d.save();
      ctx2d.beginPath();
      ctx2d.arc(mouse.x, mouse.y, MOUSE_RADIUS, 0, Math.PI * 2);
      ctx2d.strokeStyle = 'rgba(255, 80, 60, 0.50)';
      ctx2d.lineWidth   = 1.5;
      ctx2d.shadowColor = 'rgba(255, 60, 40, 0.40)';
      ctx2d.shadowBlur  = 8;
      ctx2d.stroke();
      ctx2d.restore();
    }
  }

  loop();
})();
</script>
</body>
